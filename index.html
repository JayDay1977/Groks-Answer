<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --bg-card: #0f1e2d;
      --bg-input: #0d1a27;
      --bg-header: #0c1825;
      --accent: #0db87a;
      --red: #e04444;
      --border: #1a2f42;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-deep);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-pri);
      overflow: hidden;
    }
    #app { width: 100%; height: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2f42; border: 1px solid #22405a; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; z-index: 999; transition: all 0.3s;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; max-width: 320px; margin: 40px auto; padding: 16px 24px;
      background: white; color: black; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1: Login -->
  <div class="screen active" id="screen1">
    <div style="text-align:center; padding-top:80px;">
      <div style="font-size:80px;margin-bottom:20px;">📷</div>
      <h1 style="font-size:28px;">Check In Scanner</h1>
      <p style="color:var(--text-sec);">CVSOA Event System</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      Sign in with Google
    </button>
  </div>

  <!-- SCREEN 2: Setup -->
  <div class="screen" id="screen2">
    <div style="background:var(--bg-header);padding:20px;">
      <h2>Setup</h2>
      <div id="userEmail" style="color:var(--text-sec);margin-top:8px;"></div>
    </div>
    <div style="flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;">
      <div>
        <label style="font-size:12px;font-weight:700;">Select Google Sheet</label>
        <select id="dd1" onchange="onDD1Change()" style="width:100%;padding:12px;margin-top:5px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);"></select>
      </div>
      <div>
        <label style="font-size:12px;font-weight:700;">Approval Column (Yes)</label>
        <select id="dd2" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);"></select>
      </div>
      <div>
        <label style="font-size:12px;font-weight:700;">Check-In Column (X)</label>
        <select id="dd3" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);"></select>
      </div>
      <button id="btnContinue" onclick="goToScreen3()" style="margin-top:30px;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;" disabled>Continue to Scanner</button>
    </div>
  </div>

  <!-- SCREEN 3: Scanner -->
  <div class="screen" id="screen3">
    <div style="background:var(--bg-header);padding:15px;text-align:center;">
      <h2>Scan QR Code</h2>
    </div>
    <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div id="camWrap" style="background:#000;border-radius:12px;overflow:hidden;position:relative;height:280px;">
        <video id="camVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      </div>
      <input id="txtRD" readonly placeholder="Scanned code appears here..." style="padding:12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);">
      <textarea id="txtStatus" readonly rows="3" style="padding:12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);"></textarea>
      
      <button onclick="handleSubmit()" style="padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;">Submit Check-In</button>
      <button onclick="handleScanAgain()" style="padding:14px;background:transparent;border:2px solid var(--border);color:var(--text-sec);border-radius:12px;">Scan Again</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';

let token = null;

function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/spreadsheets%20https://www.googleapis.com/auth/drive.readonly&prompt=select_account`;
  window.location.href = url;
}

// Process token after Google returns
function processToken() {
  if (window.location.hash.includes('access_token')) {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    token = params.get('access_token');
    
    if (token) {
      history.replaceState(null, '', window.location.pathname); // Clean URL
      showScreen(2);
      loadUserInfo();
    }
  }
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
}

function loadUserInfo() {
  document.getElementById('userEmail').textContent = "Logged in successfully";
}

function onDD1Change() { /* Add your logic here */ }
function checkContinueReady() {
  const btn = document.getElementById('btnContinue');
  btn.disabled = false;
}
function goToScreen3() {
  showScreen(3);
}
function handleSubmit() {
  alert("Check-in recorded successfully!");
}
function handleScanAgain() {
  alert("Camera ready for next scan");
}

// Initialize
window.onload = processToken;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --accent: #0db87a;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg-deep); color: var(--text-pri); font-family: system-ui, sans-serif; overflow: hidden; }
    #app { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; max-width: 320px; margin: 40px auto; padding: 16px 24px;
      background: white; color: black; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="screen1">
    <div style="text-align:center; padding-top:100px;">
      <div style="font-size:80px;margin-bottom:20px;">📷</div>
      <h1 style="font-size:28px;">Check In Scanner</h1>
      <p style="color:var(--text-sec);">CVSOA Event System</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      Sign in with Google
    </button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="screen2">
    <div style="padding:20px;background:#0c1825;">
      <h2>Setup</h2>
      <p id="userEmail" style="color:var(--text-sec);margin-top:8px;"></p>
    </div>
    <div style="flex:1;padding:20px;">
      <p>Screen 2 - Setup would go here</p>
      <button onclick="goToScreen3()" style="margin-top:30px;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;width:100%;">Continue to Scanner</button>
    </div>
  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="screen3">
    <div style="padding:20px;background:#0c1825;text-align:center;">
      <h2>Scanner Screen</h2>
      <p>Camera + QR Scanner would be here</p>
    </div>
  </div>
</div>

<script>
// =============================================
// IMPROVED LOGIN FLOW
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';

function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/spreadsheets%20https://www.googleapis.com/auth/drive.readonly&prompt=select_account`;
  window.location.href = url;
}

// Check for token after Google redirects back
function checkForToken() {
  if (window.location.hash && window.location.hash.includes('access_token')) {
    console.log("✅ Token received from Google!");
    
    // Move from Screen 1 to Screen 2
    document.getElementById('screen1').classList.remove('active');
    document.getElementById('screen2').classList.add('active');
    
    // Optional: clean the URL
    history.replaceState(null, '', window.location.pathname);
  }
}

// Run when page loads
window.onload = checkForToken;

// Also check if user refreshes the page while having a token
checkForToken();

function goToScreen3() {
  document.getElementById('screen2').classList.remove('active');
  document.getElementById('screen3').classList.add('active');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --bg-card: #0f1e2d;
      --bg-input: #0d1a27;
      --bg-header: #0c1825;
      --accent: #0db87a;
      --accent-dim: #0a8a5c;
      --accent-glow: rgba(13,184,122,0.25);
      --red: #e04444;
      --red-glow: rgba(224,68,68,0.25);
      --border: #1a2f42;
      --border-hi: #22405a;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
      --text-dim: #2a4858;
      --disabled-bg: #131f2b;
      --disabled-fg: #2a4050;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-deep);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-pri);
      overflow: hidden;
    }
    #app {
      width: 100%; height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2f42; border: 1px solid var(--border-hi); border-radius: 12px;
      padding: 12px 20px; font-size: 14px; z-index: 999; transition: all 0.3s;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 24px; background: #ffffff; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600; color: #1f1f1f; cursor: pointer;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .google-btn svg { width: 22px; height: 22px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ==================== SCREEN 1 - LOGIN ==================== -->
  <div class="screen active" id="screen1">
    <div style="text-align:center; padding: 40px 20px;">
      <div style="width:88px;height:88px;background:#0db87a;border-radius:24px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:48px;">
        📷
      </div>
      <h1 style="font-size:28px;margin:0 0 8px 0;color:#e8f5f0;">Check In Scanner</h1>
      <p style="color:#5a8098;">CVSOA Event System</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.56 2.89-2.2 5.35-4.64 6.98l7.4 5.76c4.34-4 6.84-9.9 6.84-17.21z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.98-2.89-.98-6.01 0-8.9L2.55 13.4c-3.4 6.78-3.4 14.82 0 21.6l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.4-5.76c-2.04 1.37-4.66 2.18-8.49 2.18-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- ==================== SCREEN 2 - SETUP ==================== -->
  <div class="screen" id="screen2">
    <div class="s2-header">
      <h2>Setup</h2>
      <div id="userInfo" style="margin-top:10px;"></div>
    </div>
    <div class="s2-body">
      <div class="field-group">
        <div class="field-label">Select Google Sheet</div>
        <select id="dd1" onchange="onDD1Change()"></select>
      </div>
      <div class="field-group">
        <div class="field-label">Approval Column (Look for "Yes")</div>
        <select id="dd2" onchange="checkContinueReady()"></select>
      </div>
      <div class="field-group">
        <div class="field-label">Check-In Column (Place "X")</div>
        <select id="dd3" onchange="checkContinueReady()"></select>
      </div>
      <button class="btn-continue" id="btnContinue" disabled onclick="goToScreen3()">Continue to Scanner</button>
    </div>
  </div>

  <!-- ==================== SCREEN 3 - SCANNER ==================== -->
  <div class="screen" id="screen3">
    <div style="background:var(--bg-header);padding:20px;text-align:center;">
      <h2>Scan QR Code</h2>
    </div>
    <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div id="camWrap" style="background:#000;border-radius:12px;overflow:hidden;position:relative;">
        <video id="camVideo" autoplay playsinline muted style="width:100%;"></video>
      </div>
      <input id="txtRD" readonly placeholder="Scanned QR code will appear here..." style="padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-pri);">
      <textarea id="txtStatus" readonly rows="3" style="padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-pri);"></textarea>
      
      <button onclick="handleSubmit()" style="padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;">Submit Check-In</button>
      <button onclick="handleScanAgain()" style="padding:14px;background:transparent;border:2px solid var(--border);color:var(--text-sec);border-radius:12px;">Scan Again</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';

function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/spreadsheets%20https://www.googleapis.com/auth/drive.readonly&prompt=select_account`;
  window.location.href = url;
}

// Basic placeholder functions - add your full logic here if needed
function onDD1Change() { console.log("Sheet selected"); }
function checkContinueReady() { console.log("Ready check"); }
function goToScreen3() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('screen3').classList.add('active'); }
function handleSubmit() { alert("Check-in submitted!"); }
function handleScanAgain() { alert("Scanning again..."); }

console.log("✅ CVSOA Scanner - Fully Clean Version Loaded");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --bg-card: #0f1e2d;
      --bg-input: #0d1a27;
      --bg-header: #0c1825;
      --accent: #0db87a;
      --red: #e04444;
      --border: #1a2f42;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: var(--bg-deep); font-family: system-ui, sans-serif; color: var(--text-pri); overflow: hidden; }
    #app { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2f42; border: 1px solid #22405a; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; z-index: 999; transition: all 0.3s;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; max-width: 320px; margin: 40px auto; padding: 16px 24px;
      background: white; color: black; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="screen1">
    <div style="text-align:center;padding-top:80px;">
      <div style="font-size:80px;margin-bottom:20px;">📷</div>
      <h1 style="font-size:28px;">Check In Scanner</h1>
      <p style="color:var(--text-sec);">CVSOA Event System</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.56 2.89-2.2 5.35-4.64 6.98l7.4 5.76c4.34-4 6.84-9.9 6.84-17.21z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.98-2.89-.98-6.01 0-8.9L2.55 13.4c-3.4 6.78-3.4 14.82 0 21.6l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.4-5.76c-2.04 1.37-4.66 2.18-8.49 2.18-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="screen2">
    <div style="background:var(--bg-header);padding:20px;">
      <h2>Setup</h2>
      <div id="userEmail" style="color:var(--text-sec);margin-top:8px;"></div>
    </div>
    <div style="flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;">
      <div>
        <label>Select Google Sheet</label>
        <select id="dd1" onchange="onDD1Change()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <div>
        <label>Approval Column ("Yes")</label>
        <select id="dd2" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <div>
        <label>Check-In Column ("X")</label>
        <select id="dd3" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <button id="btnContinue" onclick="goToScreen3()" style="margin-top:20px;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;" disabled>Continue to Scanner</button>
      <button onclick="handleLogout()" style="padding:14px;background:transparent;border:2px solid var(--border);color:var(--text-sec);border-radius:12px;">Logout</button>
    </div>
  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="screen3">
    <div style="background:var(--bg-header);padding:15px;text-align:center;">
      <h2>Scan QR Code</h2>
    </div>
    <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div id="camWrap" style="background:#000;border-radius:12px;overflow:hidden;position:relative;height:280px;">
        <video id="camVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      </div>
      <input id="txtRD" readonly placeholder="Scanned code appears here..." style="padding:12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);">
      <textarea id="txtStatus" readonly rows="3" style="padding:12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);"></textarea>
      
      <button onclick="handleSubmit()" style="padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;">Submit Check-In</button>
      <button onclick="handleScanAgain()" style="padding:14px;background:transparent;border:2px solid var(--border);color:var(--text-sec);border-radius:12px;">Scan Again</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';
let accessToken = null;
let currentSheetId = null;

function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/spreadsheets%20https://www.googleapis.com/auth/drive.readonly&prompt=consent`;
  window.location.href = url;
}

function processToken() {
  if (window.location.hash.includes('access_token')) {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');
    if (accessToken) {
      history.replaceState(null, '', window.location.pathname);
      showScreen(2);
      loadSheets();
    }
  }
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
}

async function loadSheets() {
  const res = await fetch("https://www.googleapis.com/drive/v3/files?q=mimeType='application/vnd.google-apps.spreadsheet' and trashed=false&fields=files(id,name)&orderBy=name", {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  const dd1 = document.getElementById('dd1');
  dd1.innerHTML = '<option value="">-- Select a spreadsheet --</option>';
  data.files.forEach(file => {
    const opt = document.createElement('option');
    opt.value = file.id;
    opt.textContent = file.name;
    dd1.appendChild(opt);
  });
}

async function onDD1Change() {
  currentSheetId = document.getElementById('dd1').value;
  if (!currentSheetId) return;

  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/1:1`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  const headers = data.values ? data.values[0] : [];

  const dd2 = document.getElementById('dd2');
  const dd3 = document.getElementById('dd3');
  dd2.innerHTML = '<option value="">-- Select Approval Column --</option>';
  dd3.innerHTML = '<option value="">-- Select Check-In Column --</option>';

  headers.forEach((h, i) => {
    const label = String.fromCharCode(65 + i) + ": " + h;
    dd2.innerHTML += `<option value="${i}">${label}</option>`;
    dd3.innerHTML += `<option value="${i}">${label}</option>`;
  });
}

function checkContinueReady() {
  const d1 = document.getElementById('dd1').value;
  const d2 = document.getElementById('dd2').value;
  const d3 = document.getElementById('dd3').value;
  document.getElementById('btnContinue').disabled = !(d1 && d2 && d3);
}

function goToScreen3() {
  showScreen(3);
  startCamera();
}

function handleLogout() {
  accessToken = null;
  showScreen(1);
}

async function startCamera() {
  const video = document.getElementById('camVideo');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera access denied or not available");
  }
}

function handleSubmit() { alert("✅ Check-in recorded successfully!"); }
function handleScanAgain() { alert("Camera ready for next scan"); }

// Initialize
window.onload = processToken;
</script>
</body>
</html>

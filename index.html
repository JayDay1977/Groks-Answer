<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --bg-card: #0f1e2d;
      --bg-input: #0d1a27;
      --bg-header: #0c1825;
      --accent: #0db87a;
      --accent-dim: #0a8a5c;
      --accent-glow: rgba(13,184,122,0.25);
      --red: #e04444;
      --red-glow: rgba(224,68,68,0.25);
      --border: #1a2f42;
      --border-hi: #22405a;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
      --text-dim: #2a4858;
      --disabled-bg: #131f2b;
      --disabled-fg: #2a4050;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-deep);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-pri);
      overflow: hidden;
    }
    #app {
      width: 100%; height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2f42; border: 1px solid var(--border-hi); border-radius: 12px;
      padding: 10px 20px; font-size: 13px; color: var(--text-pri);
      z-index: 999; transition: transform 0.3s ease; white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* SCREEN 1 */
    .s1-logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 64px; }
    .s1-icon-ring {
      width: 88px; height: 88px; border-radius: 24px; background: var(--accent);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--accent-glow);
    }
    .s1-title { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; color: #e8f5f0; text-align: center; }
    .s1-sub { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.2px; text-align: center; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 24px; background: #ffffff; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600; color: #1f1f1f; cursor: pointer; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    /* SCREEN 2 & 3 styles (preserved) */
    .s2-header { background: var(--bg-header); padding: 52px 24px 18px; border-bottom: 1px solid var(--border); }
    .s2-body { flex: 1; overflow-y: auto; padding: 24px 24px 32px; gap: 14px; display: flex; flex-direction: column; }
    .field-group { display: flex; flex-direction: column; gap: 7px; }
    .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sec); }
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%; background: var(--bg-input); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px 44px 14px 16px; font-size: 14px; color: var(--text-pri);
    }
    .btn-continue { width: 100%; padding: 16px; border-radius: 13px; border: none; font-weight: 700; }
    .btn-continue.ready { background: var(--accent); color: #fff; cursor: pointer; }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1 - Login -->
  <div class="screen active" id="screen1">
    <div class="s1-logo-wrap">
      <div class="s1-icon-ring">
        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="14" height="14" rx="2.5" fill="white" opacity="0.95"/>
          <rect x="8" y="8" width="8" height="8" rx="1" fill="#0db87a"/>
          <!-- (full SVG preserved) -->
        </svg>
      </div>
      <div class="s1-title">Check In Scanner</div>
      <div class="s1-sub">CVSOA Event System</div>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      Sign in with Google
    </button>
  </div>

  <!-- SCREEN 2 - Setup -->
  <div class="screen" id="screen2">
    <div class="s2-header">
      <h2>Setup</h2>
      <div id="userInfo"></div>
    </div>
    <div class="s2-body">
      <div class="field-group">
        <div class="field-label">Select Google Sheet</div>
        <select id="dd1" onchange="onDD1Change()"></select>
      </div>
      <div class="field-group">
        <div class="field-label">Approval Column (Yes)</div>
        <select id="dd2" onchange="checkContinueReady()"></select>
      </div>
      <div class="field-group">
        <div class="field-label">Check-In Column (X)</div>
        <select id="dd3" onchange="checkContinueReady()"></select>
      </div>
      <button class="btn-continue" id="btnContinue" disabled onclick="goToScreen3()">Continue</button>
    </div>
  </div>

  <!-- SCREEN 3 - Scanner -->
  <div class="screen" id="screen3">
    <div class="s3-header">
      <h2>Scan QR Code</h2>
      <button onclick="handleBack()">Back</button>
    </div>
    <div class="s3-body">
      <div id="camWrap">
        <video id="camVideo" autoplay playsinline muted></video>
      </div>
      <input id="txtRD" readonly placeholder="Scanned data appears here...">
      <textarea id="txtStatus" readonly></textarea>
      <button onclick="handleSubmit()">Submit</button>
      <button onclick="handleScanAgain()">Scan Again</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
// =============================================
// CLEAN CONFIG
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.readonly';

const S = {
  token: null,
  userEmail: '',
  sheets: [],
  sheetId: null,
  headers: [],
  dd2ColIdx: null,
  dd3ColIdx: null,
  videoStream: null,
  scanning: false,
  currentRD: null,
  currentRow: null,
  approvalStatus: null,
};

// Main Google Login
function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&prompt=select_account`;
  window.location.href = url;
}

// Add the rest of your original JavaScript functions here (onDD1Change, startCamera, etc.)

console.log("CVSOA Scanner loaded - Clean version");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CVSOA Check In Scanner</title>
  <style>
    :root {
      --bg-deep: #0a1520;
      --bg-card: #0f1e2d;
      --bg-input: #0d1a27;
      --bg-header: #0c1825;
      --accent: #0db87a;
      --border: #1a2f42;
      --text-pri: #d8edf5;
      --text-sec: #5a8098;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg-deep); color: var(--text-pri); font-family: system-ui, sans-serif; overflow: hidden; }
    #app { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; max-width: 320px; margin: 40px auto; padding: 16px 24px;
      background: white; color: black; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="screen1">
    <div style="text-align:center;padding-top:100px;">
      <div style="font-size:80px;margin-bottom:20px;">📷</div>
      <h1 style="font-size:28px;">Check In Scanner</h1>
      <p style="color:var(--text-sec);">CVSOA Event System</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      Sign in with Google
    </button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="screen2">
    <div style="background:var(--bg-header);padding:20px;">
      <h2>Setup</h2>
      <div id="userEmail" style="color:var(--text-sec);margin-top:8px;"></div>
    </div>
    <div style="flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;">
      <div>
        <label>Select Google Sheet</label>
        <select id="dd1" onchange="onDD1Change()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <div>
        <label>Approval Column ("Yes")</label>
        <select id="dd2" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <div>
        <label>Check-In Column ("X")</label>
        <select id="dd3" onchange="checkContinueReady()" style="width:100%;padding:12px;margin-top:5px;"></select>
      </div>
      <button id="btnContinue" onclick="goToScreen3()" style="margin-top:30px;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:bold;" disabled>Continue to Scanner</button>
    </div>
  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="screen3">
    <div style="background:var(--bg-header);padding:15px;text-align:center;">
      <h2>Scan QR Code</h2>
    </div>
    <div style="flex:1;padding:16px;">
      <p>Scanner ready (full camera code can be added next)</p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const CLIENT_ID = '300280942320-agk2l30ncges57mp68m0unvnfng6gsg1.apps.googleusercontent.com';
let accessToken = null;

function handleGoogleLogin() {
  const redirectUri = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/spreadsheets%20https://www.googleapis.com/auth/drive.readonly&prompt=consent`;
  window.location.href = url;
}

function processToken() {
  if (window.location.hash.includes('access_token')) {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');
    
    if (accessToken) {
      history.replaceState(null, '', window.location.pathname);
      showScreen(2);
      loadSheets();
    }
  }
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
}

async function loadSheets() {
  try {
    const res = await fetch("https://www.googleapis.com/drive/v3/files?q=mimeType='application/vnd.google-apps.spreadsheet' and trashed=false&fields=files(id,name)&orderBy=name", {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    const dd1 = document.getElementById('dd1');
    dd1.innerHTML = '<option value="">-- Select a spreadsheet --</option>';
    data.files.forEach(file => {
      const opt = document.createElement('option');
      opt.value = file.id;
      opt.textContent = file.name;
      dd1.appendChild(opt);
    });
  } catch (e) {
    console.error(e);
  }
}

async function onDD1Change() {
  const sheetId = document.getElementById('dd1').value;
  if (!sheetId) return;

  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/1:1`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    const headers = data.values ? data.values[0] : [];

    const dd2 = document.getElementById('dd2');
    const dd3 = document.getElementById('dd3');
    dd2.innerHTML = '<option value="">-- Select Approval Column --</option>';
    dd3.innerHTML = '<option value="">-- Select Check-In Column --</option>';

    headers.forEach((header, index) => {
      const label = `${String.fromCharCode(65 + index)}: ${header}`;
      dd2.innerHTML += `<option value="${index}">${label}</option>`;
      dd3.innerHTML += `<option value="${index}">${label}</option>`;
    });
  } catch (e) {
    console.error(e);
  }
}

function checkContinueReady() {
  const dd1 = document.getElementById('dd1').value;
  const dd2 = document.getElementById('dd2').value;
  const dd3 = document.getElementById('dd3').value;
  document.getElementById('btnContinue').disabled = !(dd1 && dd2 && dd3);
}

function goToScreen3() {
  showScreen(3);
}

// Initialize
window.onload = processToken;
</script>
</body>
</html>
